<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AIOS Neural Map — Memory Graph</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050508;
    --panel: rgba(10,10,20,0.88);
    --border: rgba(0,245,255,0.15);
    --accent: #00f5ff;
    --accent2: #7b5ea7;
    --mem: #00f5ff;
    --rev: #ff4757;
    --trace: #ffa502;
    --src: #2ed573;
    --glow: rgba(0,245,255,0.4);
    --text: #c8d6df;
    --dim: #5a6a74;
    --font: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #graph-container {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* ── Header bar ── */
  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    height: 52px;
    background: linear-gradient(180deg, rgba(5,5,8,0.98) 0%, rgba(5,5,8,0.0) 100%);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    pointer-events: none;
  }
  #header > * { pointer-events: auto; }

  .logo {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 600; letter-spacing: 0.08em;
    color: var(--accent); text-transform: uppercase;
    text-decoration: none;
  }
  .logo svg { opacity: 0.9; }

  #search-wrap {
    flex: 1; max-width: 340px;
    position: relative;
  }
  #search {
    width: 100%;
    background: rgba(0,245,255,0.06);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px 6px 32px;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  #search::placeholder { color: var(--dim); }
  #search:focus {
    border-color: rgba(0,245,255,0.4);
    box-shadow: 0 0 0 3px rgba(0,245,255,0.08);
  }
  .search-icon {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--dim); pointer-events: none;
  }

  #stats-badge {
    font-size: 11px; color: var(--dim);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  #stats-badge span { color: var(--accent); font-weight: 600; }

  /* ── Right panel: legend + controls ── */
  #panel {
    position: fixed;
    top: 64px; right: 16px;
    z-index: 100;
    width: 200px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    backdrop-filter: blur(16px);
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .panel-section { display: flex; flex-direction: column; gap: 8px; }
  .panel-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
    color: var(--dim); text-transform: uppercase;
  }

  .legend-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--text); cursor: pointer;
    transition: opacity .15s;
    user-select: none;
  }
  .legend-row:hover { opacity: 0.7; }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 6px currentColor;
  }
  .legend-count { margin-left: auto; color: var(--dim); font-size: 11px; }

  .ctrl-row {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; color: var(--text);
  }
  .ctrl-select {
    background: rgba(0,245,255,0.07);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 11px;
    padding: 3px 6px;
    outline: none;
    cursor: pointer;
  }
  .ctrl-select option { background: #0a0a14; }

  .btn-sm {
    width: 100%;
    padding: 7px;
    background: rgba(0,245,255,0.08);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--accent);
    font-size: 12px; font-weight: 600;
    cursor: pointer;
    transition: background .15s, box-shadow .15s;
    letter-spacing: 0.04em;
  }
  .btn-sm:hover {
    background: rgba(0,245,255,0.16);
    box-shadow: 0 0 12px rgba(0,245,255,0.2);
  }

  /* ── Node tooltip ── */
  #tooltip {
    position: fixed;
    z-index: 200;
    pointer-events: none;
    background: rgba(5,5,10,0.96);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    max-width: 280px;
    font-size: 12px;
    line-height: 1.55;
    backdrop-filter: blur(20px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    opacity: 0;
    transition: opacity .15s;
  }
  #tooltip.visible { opacity: 1; }
  .tt-type {
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; margin-bottom: 5px;
  }
  .tt-label { font-size: 12px; color: var(--text); margin-bottom: 6px; }
  .tt-meta { font-size: 11px; color: var(--dim); }
  .tt-meta strong { color: var(--text); }

  /* ── Loading overlay ── */
  #loading {
    position: fixed; inset: 0; z-index: 300;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px;
    transition: opacity .5s;
  }
  #loading.done { opacity: 0; pointer-events: none; }

  .loader-ring {
    width: 56px; height: 56px;
    border: 2px solid rgba(0,245,255,0.12);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loader-text {
    font-size: 13px; color: var(--dim);
    letter-spacing: 0.06em;
  }
  .loader-text span { color: var(--accent); }

  /* ── Bottom status bar ── */
  #statusbar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 100;
    height: 30px;
    background: linear-gradient(0deg, rgba(5,5,8,0.98) 0%, transparent 100%);
    display: flex; align-items: center;
    padding: 0 20px;
    gap: 20px;
    font-size: 11px; color: var(--dim);
  }
  .sb-item { display: flex; align-items: center; gap: 5px; }
  .sb-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  #selected-info { margin-left: auto; color: var(--accent); font-size: 11px; }
</style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading">
  <div class="loader-ring"></div>
  <div class="loader-text">Loading <span>Neural Map</span>…</div>
</div>

<!-- Header -->
<div id="header">
  <a class="logo" href="/">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <circle cx="9" cy="9" r="8" stroke="#00f5ff" stroke-width="1.2"/>
      <circle cx="9" cy="9" r="3" fill="#00f5ff" opacity="0.6"/>
      <line x1="9" y1="1" x2="9" y2="5" stroke="#00f5ff" stroke-width="1.2"/>
      <line x1="9" y1="13" x2="9" y2="17" stroke="#00f5ff" stroke-width="1.2"/>
      <line x1="1" y1="9" x2="5" y2="9" stroke="#00f5ff" stroke-width="1.2"/>
      <line x1="13" y1="9" x2="17" y2="9" stroke="#00f5ff" stroke-width="1.2"/>
    </svg>
    AIOS Neural Map
  </a>

  <div id="search-wrap">
    <svg class="search-icon" width="13" height="13" viewBox="0 0 13 13" fill="none">
      <circle cx="5.5" cy="5.5" r="4.5" stroke="#5a6a74" stroke-width="1.2"/>
      <line x1="8.9" y1="8.9" x2="12" y2="12" stroke="#5a6a74" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    <input id="search" type="text" placeholder="Search memory nodes…" autocomplete="off"/>
  </div>

  <div id="stats-badge">
    <span id="stat-nodes">—</span> nodes &nbsp;·&nbsp; <span id="stat-edges">—</span> edges
  </div>
</div>

<!-- Graph canvas -->
<div id="graph-container"></div>

<!-- Right panel -->
<div id="panel">
  <div class="panel-section">
    <div class="panel-label">Node types</div>
    <div class="legend-row" data-type="memory">
      <div class="legend-dot" style="background:#00f5ff;color:#00f5ff"></div>
      Memory <span class="legend-count" id="cnt-memory">0</span>
    </div>
    <div class="legend-row" data-type="review">
      <div class="legend-dot" style="background:#ff4757;color:#ff4757"></div>
      Review <span class="legend-count" id="cnt-review">0</span>
    </div>
    <div class="legend-row" data-type="trace">
      <div class="legend-dot" style="background:#ffa502;color:#ffa502"></div>
      Trace <span class="legend-count" id="cnt-trace">0</span>
    </div>
    <div class="legend-row" data-type="source">
      <div class="legend-dot" style="background:#2ed573;color:#2ed573"></div>
      Source <span class="legend-count" id="cnt-source">0</span>
    </div>
  </div>

  <div class="panel-section">
    <div class="panel-label">View</div>
    <div class="ctrl-row">
      Scope
      <select class="ctrl-select" id="view-sel">
        <option value="curated">Curated</option>
        <option value="raw">Raw</option>
      </select>
    </div>
    <div class="ctrl-row">
      Limit
      <select class="ctrl-select" id="limit-sel">
        <option value="200">200</option>
        <option value="500" selected>500</option>
        <option value="1000">1000</option>
        <option value="2000">2000</option>
      </select>
    </div>
  </div>

  <div class="panel-section">
    <button class="btn-sm" id="reload-btn">↺ Reload graph</button>
    <button class="btn-sm" id="reset-btn" style="color:var(--dim);border-color:rgba(255,255,255,0.08);background:transparent">Reset camera</button>
  </div>
</div>

<!-- Tooltip -->
<div id="tooltip">
  <div class="tt-type" id="tt-type">—</div>
  <div class="tt-label" id="tt-label">—</div>
  <div class="tt-meta" id="tt-meta">—</div>
</div>

<!-- Status bar -->
<div id="statusbar">
  <div class="sb-item">
    <div class="sb-dot"></div>
    MemoryOS live
  </div>
  <div class="sb-item" id="sb-view">view: curated</div>
  <div class="sb-item" id="sb-time">—</div>
  <div id="selected-info"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.167.1/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1.73.6/dist/3d-force-graph.min.js"></script>
<script>
'use strict';

/* ── colour palette ── */
const COLORS = {
  memory: '#00f5ff',
  review: '#ff4757',
  trace:  '#ffa502',
  source: '#2ed573',
  default:'#8892a4',
};

const GLOW = {
  memory: 'rgba(0,245,255,0.55)',
  review: 'rgba(255,71,87,0.55)',
  trace:  'rgba(255,165,2,0.55)',
  source: 'rgba(46,213,115,0.55)',
  default:'rgba(136,146,164,0.4)',
};

/* ── state ── */
let graph = null;
let allNodes = [], allEdges = [];
let hiddenTypes = new Set();
let selectedNode = null;

/* ── init graph ── */
function initGraph() {
  graph = ForceGraph3D({ controlType: 'orbit' })(document.getElementById('graph-container'))
    .backgroundColor('#050508')
    .nodeLabel(n => '')  // we use our own tooltip
    .nodeColor(n => hiddenTypes.has(n.type) ? 'transparent' : (COLORS[n.type] || COLORS.default))
    .nodeOpacity(0.92)
    .nodeResolution(16)
    .nodeRelSize(4.2)
    .nodeVal(n => {
      const deg = n.degree || 1;
      return Math.max(1, Math.log2(deg + 1) * 2.2);
    })
    .linkColor(l => 'rgba(0,245,255,0.12)')
    .linkWidth(0.5)
    .linkOpacity(0.5)
    .linkDirectionalParticles(l => l.type === 'reviews' ? 2 : 0)
    .linkDirectionalParticleWidth(1.2)
    .linkDirectionalParticleColor(() => 'rgba(0,245,255,0.7)')
    .onNodeHover(handleHover)
    .onNodeClick(handleClick)
    .onBackgroundClick(() => {
      selectedNode = null;
      document.getElementById('selected-info').textContent = '';
      graph.nodeColor(n => hiddenTypes.has(n.type) ? 'transparent' : (COLORS[n.type] || COLORS.default));
    });

  // star particles in background
  addStarField();
}

/* ── star field ── */
function addStarField() {
  const scene = graph.scene();
  const geo = new THREE.BufferGeometry();
  const count = 1800;
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count * 3; i++) {
    pos[i] = (Math.random() - 0.5) * 2400;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({
    color: 0x4a6a8a,
    size: 1.2,
    sizeAttenuation: true,
    transparent: true,
    opacity: 0.5,
  });
  scene.add(new THREE.Points(geo, mat));
}

/* ── load data ── */
async function loadData() {
  const view  = document.getElementById('view-sel').value;
  const limit = document.getElementById('limit-sel').value;

  document.getElementById('loading').classList.remove('done');
  document.querySelector('.loader-text').innerHTML =
    `Loading <span>Neural Map</span>…`;

  const t0 = performance.now();
  try {
    const r = await fetch(`/neural-map-data?view=${view}&limit=${limit}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    if (data.error) throw new Error(data.error);

    allNodes = data.nodes || [];
    allEdges = data.edges || [];

    applyGraph(allNodes, allEdges);
    updateStats(allNodes, allEdges);
    updateCounters(allNodes);

    const elapsed = ((performance.now() - t0) / 1000).toFixed(1);
    document.getElementById('sb-time').textContent = `loaded in ${elapsed}s`;
    document.getElementById('sb-view').textContent = `view: ${view}`;
    document.getElementById('loading').classList.add('done');
  } catch (e) {
    document.querySelector('.loader-text').innerHTML =
      `<span style="color:#ff4757">Error: ${e.message}</span>`;
  }
}

function applyGraph(nodes, edges) {
  // Remap edges to use node id objects (ForceGraph3D resolves by id field)
  graph.graphData({
    nodes: nodes.map(n => ({ ...n, id: n.id })),
    links: edges.map(e => ({ source: e.source, target: e.target, type: e.type, weight: e.weight })),
  });
}

function updateStats(nodes, edges) {
  document.getElementById('stat-nodes').textContent = nodes.length.toLocaleString();
  document.getElementById('stat-edges').textContent = edges.length.toLocaleString();
}

function updateCounters(nodes) {
  const counts = {};
  nodes.forEach(n => { counts[n.type] = (counts[n.type] || 0) + 1; });
  ['memory','review','trace','source'].forEach(t => {
    const el = document.getElementById(`cnt-${t}`);
    if (el) el.textContent = (counts[t] || 0).toLocaleString();
  });
}

/* ── tooltip ── */
const tooltip = document.getElementById('tooltip');
const ttType  = document.getElementById('tt-type');
const ttLabel = document.getElementById('tt-label');
const ttMeta  = document.getElementById('tt-meta');

function handleHover(node) {
  if (!node) { tooltip.classList.remove('visible'); return; }
  const col = COLORS[node.type] || COLORS.default;
  ttType.style.color = col;
  ttType.textContent = (node.type || 'node').toUpperCase();
  ttLabel.textContent = truncate(node.label || node.id, 90);

  const deg = node.degree || 0;
  const act = node.activity != null ? (node.activity * 100).toFixed(0) + '%' : '—';
  const proj = node.attrs?.project || '';
  const status = node.attrs?.status || node.attrs?.effective_status || '';
  const parts = [];
  if (proj)    parts.push(`<strong>project</strong> ${proj}`);
  if (status)  parts.push(`<strong>status</strong> ${status}`);
  parts.push(`<strong>degree</strong> ${deg} · <strong>activity</strong> ${act}`);
  if (node.why_visible) parts.push(`<strong>why visible</strong> ${node.why_visible}`);
  ttMeta.innerHTML = parts.join('<br>');
  tooltip.classList.add('visible');
}

document.addEventListener('mousemove', e => {
  const pad = 14;
  let x = e.clientX + pad;
  let y = e.clientY + pad;
  if (x + 290 > window.innerWidth)  x = e.clientX - 290 - pad;
  if (y + 160 > window.innerHeight) y = e.clientY - 160 - pad;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
});

/* ── click: highlight neighbourhood ── */
function handleClick(node) {
  if (!node) return;
  selectedNode = node;
  document.getElementById('selected-info').textContent =
    `⬡ ${truncate(node.label || node.id, 50)}`;

  const linkedIds = new Set([node.id]);
  graph.graphData().links.forEach(l => {
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    if (sid === node.id) linkedIds.add(tid);
    if (tid === node.id) linkedIds.add(sid);
  });

  graph.nodeColor(n => {
    if (!linkedIds.has(n.id)) return 'rgba(20,25,35,0.35)';
    return COLORS[n.type] || COLORS.default;
  });

  // zoom to node
  graph.cameraPosition(
    { x: node.x * 1.5, y: node.y * 1.5, z: node.z * 1.5 },
    node,
    800,
  );
}

/* ── search ── */
let searchTimer = null;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => applySearch(e.target.value.trim()), 200);
});

function applySearch(q) {
  if (!q) {
    graph.nodeColor(n => hiddenTypes.has(n.type) ? 'transparent' : (COLORS[n.type] || COLORS.default));
    return;
  }
  const lq = q.toLowerCase();
  graph.nodeColor(n => {
    if (hiddenTypes.has(n.type)) return 'transparent';
    const hit = (n.label || '').toLowerCase().includes(lq) ||
                (n.id || '').toLowerCase().includes(lq) ||
                (n.attrs?.project || '').toLowerCase().includes(lq);
    return hit ? (COLORS[n.type] || COLORS.default) : 'rgba(20,25,35,0.25)';
  });
}

/* ── legend toggle ── */
document.querySelectorAll('.legend-row').forEach(row => {
  row.addEventListener('click', () => {
    const t = row.dataset.type;
    if (hiddenTypes.has(t)) {
      hiddenTypes.delete(t);
      row.style.opacity = '1';
    } else {
      hiddenTypes.add(t);
      row.style.opacity = '0.35';
    }
    graph.nodeColor(n => hiddenTypes.has(n.type) ? 'transparent' : (COLORS[n.type] || COLORS.default));
  });
});

/* ── controls ── */
document.getElementById('reload-btn').addEventListener('click', loadData);
document.getElementById('reset-btn').addEventListener('click', () => {
  graph.cameraPosition({ x: 0, y: 0, z: 600 }, { x: 0, y: 0, z: 0 }, 800);
});

/* ── util ── */
function truncate(s, n) { return s && s.length > n ? s.slice(0, n) + '…' : s; }

/* ── boot ── */
initGraph();
loadData();
</script>
</body>
</html>
