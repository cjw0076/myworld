<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIOS</title>
  <style>
    :root {
      --ink: #1f2933;
      --muted: #667085;
      --line: #d7dde6;
      --bg: #f0f4f8;
      --panel: #ffffff;
      --teal: #087f8c;
      --teal-light: #e0f4f6;
      --green: #2f7d4f;
      --amber: #9a5b00;
      --red: #a33a3a;
      --radius: 12px;
      --user-bg: #087f8c;
      --aios-bg: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      background: var(--bg); color: var(--ink);
      display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }

    /* ── Header ── */
    .top-bar {
      background: var(--panel); border-bottom: 1px solid var(--line);
      padding: 10px 20px; display: flex; align-items: center; gap: 12px;
      flex-shrink: 0;
    }
    .top-bar .brand { font-weight: 800; font-size: 1.05rem; color: var(--teal); }
    .top-bar .tagline { font-size: 0.8rem; color: var(--muted); flex: 1; }
    .top-bar .settings { display: flex; gap: 8px; align-items: center; font-size: 0.78rem; color: var(--muted); }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%; display: inline-block;
      background: var(--muted); margin-right: 2px; vertical-align: middle;
    }
    .status-dot.ok { background: var(--green); }
    .status-dot.err { background: var(--red); }
    .top-bar select {
      padding: 3px 7px; border: 1px solid var(--line); border-radius: 6px;
      font-size: 0.78rem; background: var(--bg); color: var(--ink); font-family: inherit;
    }

    /* ── Chat thread ── */
    .chat-thread {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .chat-thread::-webkit-scrollbar { width: 4px; }
    .chat-thread::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }

    .msg { display: flex; flex-direction: column; max-width: 72%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.aios { align-self: flex-start; align-items: flex-start; }

    .msg-bubble {
      padding: 10px 14px; border-radius: var(--radius); font-size: 0.92rem;
      line-height: 1.55; word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: var(--user-bg); color: #fff;
      border-bottom-right-radius: 3px;
    }
    .msg.aios .msg-bubble {
      background: var(--aios-bg); color: var(--ink);
      border: 1px solid var(--line); border-bottom-left-radius: 3px;
      box-shadow: 0 1px 4px rgba(31,41,51,0.06);
    }
    .msg.aios .msg-bubble.loading {
      color: var(--muted); font-style: italic;
    }
    .msg-meta { font-size: 0.72rem; color: var(--muted); margin-top: 4px; padding: 0 4px; }

    /* Inline tool trace (collapsible) */
    /* Always-visible metadata bar under AIOS bubble */
    .msg-meta-bar {
      display: flex; gap: 6px; flex-wrap: wrap; margin-top: 5px; padding: 0 4px;
    }
    .meta-tag {
      font-size: 0.7rem; padding: 1px 6px; border-radius: 10px;
      background: var(--teal-light); color: var(--teal); font-weight: 500;
    }
    .meta-tag.tool { background: #f0f0f8; color: #5a5aaa; }

    .trace-toggle {
      font-size: 0.72rem; color: var(--teal); cursor: pointer; margin-top: 6px;
      padding: 0 4px; user-select: none;
    }
    .trace-toggle:hover { text-decoration: underline; }
    .trace-panel {
      background: var(--bg); border: 1px solid var(--line); border-radius: 8px;
      padding: 8px 12px; margin-top: 4px; font-size: 0.78rem; color: var(--muted);
      display: none;
    }
    .trace-panel.open { display: block; }
    .trace-tool { display: flex; gap: 6px; padding: 2px 0; }
    .trace-tool .t-num { color: var(--muted); min-width: 22px; }
    .trace-tool .t-name { font-weight: 600; color: var(--teal); }
    .trace-tool .t-status { font-size: 0.72rem; }
    .pip-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
    .pip-chip {
      padding: 1px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 600;
      background: var(--line); color: var(--muted);
    }
    .pip-chip.ok { background: #e6f5ec; color: var(--green); }
    .pip-chip.warn { background: #fff7e0; color: var(--amber); }

    /* Thinking indicator */
    .thinking { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
    .thinking span {
      width: 6px; height: 6px; border-radius: 50%; background: var(--muted);
      animation: blink 1.2s infinite;
    }
    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }

    /* Welcome message */
    .welcome {
      text-align: center; padding: 40px 20px; color: var(--muted);
    }
    .welcome h2 { font-size: 1.2rem; color: var(--ink); margin-bottom: 8px; }
    .welcome p { font-size: 0.88rem; line-height: 1.6; }
    .welcome .examples { margin-top: 16px; display: flex; flex-direction: column; gap: 6px; }
    .example-chip {
      display: inline-block; padding: 6px 14px; border: 1px solid var(--line);
      border-radius: 20px; font-size: 0.82rem; cursor: pointer; background: var(--panel);
      transition: border-color 0.1s;
    }
    .example-chip:hover { border-color: var(--teal); color: var(--teal); }

    /* ── Markdown rendering in AIOS bubbles ── */
    .msg-bubble pre.code-block {
      background: #1e1e2e; color: #cdd6f4;
      border-radius: 8px; padding: 12px 14px; margin: 8px 0;
      font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
      font-size: 0.82rem; line-height: 1.55; overflow-x: auto;
      white-space: pre; border: 1px solid rgba(205,214,244,0.1);
    }
    .msg-bubble code.inline-code {
      background: rgba(8,127,140,0.12); color: var(--teal);
      padding: 1px 5px; border-radius: 4px;
      font-family: monospace; font-size: 0.88em;
    }
    .msg-bubble strong { font-weight: 700; }
    .msg-bubble em { font-style: italic; color: var(--muted); }

    /* ── Input bar ── */
    .input-bar {
      background: var(--panel); border-top: 1px solid var(--line);
      padding: 12px 20px; flex-shrink: 0; display: flex; gap: 10px; align-items: center;
    }
    .input-bar textarea {
      flex: 1; padding: 10px 14px; border: 1.5px solid var(--line);
      border-radius: 10px; font-size: 0.92rem; font-family: inherit; resize: none;
      outline: none; transition: border-color 0.15s; max-height: 120px; min-height: 44px;
      line-height: 1.45; overflow-y: auto;
    }
    .input-bar textarea:focus { border-color: var(--teal); }
    .input-bar button {
      padding: 10px 20px; background: var(--teal); color: #fff;
      border: none; border-radius: 10px; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s; height: 44px; white-space: nowrap;
    }
    .input-bar button:hover { opacity: 0.88; }
    .input-bar button:disabled { opacity: 0.45; cursor: default; }
  </style>
</head>
<body>

  <div class="top-bar">
    <span class="brand">AIOS</span>
    <span class="tagline" id="tagline">organic pipeline · local LLM · memory-first reasoning</span>
    <div class="settings">
      <span id="statusBadge" title="AIOS API status"><span class="status-dot" id="statusDot"></span><span id="statusText">connecting…</span></span>
      <label>Provider:</label>
      <select id="providerSelect">
        <option value="auto" selected>auto</option>
        <option value="ollama_rest">qwen3:1.7b</option>
        <option value="ollama_rest_8b">qwen3:8b</option>
        <option value="claude">claude</option>
        <option value="codex">codex</option>
        <option value="gemini">gemini</option>
      </select>
      <label>Turns:</label>
      <select id="maxTurns">
        <option value="4">4</option>
        <option value="6" selected>6</option>
        <option value="12">12</option>
      </select>
      <button id="langToggleBtn" onclick="toggleLang()" title="Switch language / 언어 전환" style="
        padding:4px 10px;background:transparent;border:1px solid var(--line);
        border-radius:6px;font-size:0.75rem;color:var(--muted);cursor:pointer;
        transition:border-color 0.15s,color 0.15s;
      " onmouseover="this.style.borderColor='var(--teal)';this.style.color='var(--teal)'"
         onmouseout="this.style.borderColor='var(--line)';this.style.color='var(--muted)'">
        한국어
      </button>
      <a href="/neural-map" title="MemoryOS 3D Neural Map" style="
        padding:4px 10px;background:transparent;border:1px solid var(--line);
        border-radius:6px;font-size:0.75rem;color:var(--muted);cursor:pointer;
        transition:border-color 0.15s,color 0.15s;text-decoration:none;
        display:inline-flex;align-items:center;gap:4px;
      " onmouseover="this.style.borderColor='var(--teal)';this.style.color='var(--teal)'"
         onmouseout="this.style.borderColor='var(--line)';this.style.color='var(--muted)'">
        ⬡ Neural Map
      </a>
      <button id="newChatBtn" onclick="newChat()" title="Start new conversation" style="
        padding:4px 10px;background:transparent;border:1px solid var(--line);
        border-radius:6px;font-size:0.75rem;color:var(--muted);cursor:pointer;
        transition:border-color 0.15s,color 0.15s;
      " onmouseover="this.style.borderColor='var(--teal)';this.style.color='var(--teal)'"
         onmouseout="this.style.borderColor='var(--line)';this.style.color='var(--muted)'">
        New chat
      </button>
    </div>
  </div>

  <div class="chat-thread" id="chatThread">
    <div class="welcome" id="welcomeMsg">
      <h2 id="welcomeH2">Ask AIOS anything</h2>
      <p id="welcomeP">Memory recall · web search · file access · tool use — all from a natural language goal.</p>
      <div class="examples" id="exampleChips">
        <span class="example-chip" onclick="fillGoal('What is AIOS and how does it work?')">What is AIOS?</span>
        <span class="example-chip" onclick="fillGoal('Search the web for the latest AI news today')">Latest AI news</span>
        <span class="example-chip" onclick="fillGoal('Write a Python function to find prime numbers')">Python: prime numbers</span>
        <span class="example-chip" onclick="fillGoal('How do I install AIOS and get started?')">How to install AIOS</span>
      </div>
    </div>
  </div>

  <div class="input-bar">
    <textarea id="goalInput" placeholder="Type your goal… (Enter to send, Shift+Enter for newline)"
              rows="1" autocomplete="off"></textarea>
    <button id="runBtn" onclick="runGoal()">Run</button>
  </div>

  <script>
    const API_BASE = 'http://localhost:8741';

    // ── i18n: English (default) / Korean toggle ───────────────────────────────
    const I18N = {
      en: {
        tagline: 'organic pipeline · local LLM · memory-first reasoning',
        statusConnecting: 'connecting…',
        statusOk: 'connected',
        statusErr: 'offline',
        welcomeH2: 'Ask AIOS anything',
        welcomeP: 'Memory recall · web search · file access · tool use — all from a natural language goal.',
        chips: [
          ['What is AIOS and how does it work?', 'What is AIOS?'],
          ['Search the web for the latest AI news today', 'Latest AI news'],
          ['Write a Python function to find prime numbers', 'Python: prime numbers'],
          ['How do I install AIOS and get started?', 'How to install AIOS'],
        ],
        placeholder: 'Type your goal… (Enter to send, Shift+Enter for newline)',
        runBtn: 'Run',
        newChat: 'New chat',
        langToggle: '한국어',
        thinkingLoad: 'loading memory · starting loop…',
      },
      ko: {
        tagline: '유기적 파이프라인 · 로컬 LLM · 메모리 기반 추론',
        statusConnecting: '연결 중…',
        statusOk: '연결됨',
        statusErr: '오프라인',
        welcomeH2: 'AIOS에게 물어보세요',
        welcomeP: '메모리, 외부 URL, 파일, 메모 저장 등을 통해 자연어 goal을 실행합니다.',
        chips: [
          ['AIOS가 뭔가요?', 'AIOS가 뭔가요?'],
          ['서울 날씨 알려줘', '서울 날씨 알려줘'],
          ['파이썬으로 피보나치 수열 구현해줘', '파이썬으로 피보나치 수열'],
          ['AIOS 설치 방법 알려줘', 'AIOS 설치 방법'],
        ],
        placeholder: 'goal을 입력하세요… (Enter = 전송, Shift+Enter = 줄바꿈)',
        runBtn: '실행',
        newChat: '새 대화',
        langToggle: 'English',
        thinkingLoad: '메모리 로드 · 루프 시작…',
      },
    };

    let _lang = localStorage.getItem('aios_lang') || 'en';

    function applyLang(lang) {
      _lang = lang;
      localStorage.setItem('aios_lang', lang);
      const t = I18N[lang];
      document.getElementById('tagline').textContent = t.tagline;
      const stEl = document.getElementById('statusText');
      if (stEl && stEl.dataset.state) {
        stEl.textContent = t['status' + stEl.dataset.state] || stEl.textContent;
      }
      document.getElementById('welcomeH2').textContent = t.welcomeH2;
      document.getElementById('welcomeP').textContent = t.welcomeP;
      const chips = document.getElementById('exampleChips');
      if (chips) {
        chips.innerHTML = t.chips.map(([goal, label]) =>
          `<span class="example-chip" onclick="fillGoal(${JSON.stringify(goal)})">${label}</span>`
        ).join('');
      }
      document.getElementById('goalInput').placeholder = t.placeholder;
      document.getElementById('runBtn').textContent = t.runBtn;
      document.getElementById('newChatBtn').textContent = t.newChat;
      document.getElementById('langToggleBtn').textContent = t.langToggle;
    }

    function toggleLang() {
      applyLang(_lang === 'en' ? 'ko' : 'en');
    }

    // Per-tab session ID for conversation continuity
    const SESSION_ID = (() => {
      let id = sessionStorage.getItem('aios_session_id');
      if (!id) { id = (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2)); sessionStorage.setItem('aios_session_id', id); }
      return id;
    })();

    let _running = false;
    let _pendingAiosBubble = null;

    // ── Restore chat from localStorage ────────────────────────────────────────
    const HISTORY_KEY = 'aios_chat_history';
    function loadHistory() {
      try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
      catch { return []; }
    }
    function saveHistory(goal, answer, meta) {
      const h = loadHistory();
      h.unshift({ goal, answer, meta, ts: new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'}) });
      localStorage.setItem(HISTORY_KEY, JSON.stringify(h.slice(0, 20)));
    }
    function restoreHistory() {
      const h = loadHistory();
      if (h.length === 0) return;
      document.getElementById('welcomeMsg').style.display = 'none';
      for (let i = h.length - 1; i >= 0; i--) {
        const item = h[i];
        appendUserMsg(item.goal, item.ts);
        appendAiosMsg(item.answer, item.meta, item.ts, true /* restored */);
      }
      scrollToBottom();
    }

    function newChat() {
      if (_running) return;  // don't clear while a request is in flight
      localStorage.removeItem(HISTORY_KEY);
      sessionStorage.removeItem('aios_session_id');
      // Reload so session ID + thread are fully fresh
      window.location.reload();
    }

    // ── Markdown renderer (no external deps — works offline) ─────────────────
    function renderMd(text) {
      if (!text) return '(답변 없음)';
      const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      // Split on fenced code blocks to protect their content
      const parts = text.split(/(```[\s\S]*?```)/g);
      return parts.map((part, i) => {
        if (i % 2 === 1) {
          // Fenced code block: ```lang\ncode```
          const m = part.match(/```(\w*)\n?([\s\S]*?)```/);
          if (m) {
            const code = esc(m[2].replace(/\n$/, ''));
            return `<pre class="code-block"><code>${code}</code></pre>`;
          }
          return esc(part);
        }
        // Regular prose: escape first, then apply inline formatting
        let s = esc(part);
        s = s.replace(/`([^`\n]+)`/g, '<code class="inline-code">$1</code>');
        s = s.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
        s = s.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
        s = s.replace(/\n/g, '<br>');
        return s;
      }).join('');
    }

    // ── Message rendering ─────────────────────────────────────────────────────
    function appendUserMsg(goal, ts) {
      const thread = document.getElementById('chatThread');
      const div = document.createElement('div');
      div.className = 'msg user';
      div.innerHTML = `
        <div class="msg-bubble">${escHtml(goal)}</div>
        <div class="msg-meta">${ts || ''}</div>`;
      thread.appendChild(div);
      return div;
    }

    function appendAiosThinking() {
      const thread = document.getElementById('chatThread');
      const div = document.createElement('div');
      div.className = 'msg aios';
      div.innerHTML = `<div class="msg-bubble loading">
        <div class="thinking"><span></span><span></span><span></span></div>
      </div>`;
      thread.appendChild(div);
      _pendingAiosBubble = div;
      return div;
    }

    function updateThinkingLabel(label) {
      if (!_pendingAiosBubble) return;
      const b = _pendingAiosBubble.querySelector('.msg-bubble');
      if (b) b.innerHTML = `<div class="thinking"><span></span><span></span><span></span></div>
        <div style="font-size:0.78rem;color:var(--muted);margin-top:6px">${escHtml(label)}</div>`;
    }

    function appendAiosMsg(answer, meta, ts, collapsed) {
      // meta: {exit, turns, trajectory, memory_hits, run_id, pipe}
      const m = meta || {};
      const traj = m.trajectory || [];
      const exitOk = ['model_finished', 'needs_approval'].includes(m.exit || '');
      const traceId = 'tr-' + Math.random().toString(36).slice(2, 8);

      let tracePips = '';
      if (m.pipe) {
        const p = m.pipe; const post = p.postamble || {};
        const pre = p.preamble || {};
        const chips = [
          ['memory', pre.memory_status === 'ok', pre.memory_hits != null ? `${pre.memory_hits}hits` : (pre.memory_status||'?')],
          ['loop', exitOk, `${m.turns||0}T`],
          ['dream', String(post.dream_agora_ingest||'').startsWith('ok'), 'dream'],
        ];
        tracePips = `<div class="pip-row">${chips.map(([l,ok,v]) =>
          `<span class="pip-chip ${ok?'ok':'warn'}">${l}:${v}</span>`).join('')}</div>`;
      }

      let traceHtml = '';
      if (traj.length > 0 || tracePips) {
        const toolHtml = traj.map(t =>
          `<div class="trace-tool">
            <span class="t-num">T${t.turn}</span>
            <span class="t-name">${escHtml(t.tool||'?')}</span>
            <span class="t-status">${escHtml(t.status||'')} ${t.decision?'('+escHtml(t.decision)+')':''}</span>
          </div>`).join('');
        traceHtml = `
          <span class="trace-toggle" onclick="toggleTrace('${traceId}')">▸ 실행 상세</span>
          <div class="trace-panel" id="${traceId}">
            ${toolHtml}${tracePips}
            ${m.run_id ? `<div style="margin-top:4px;font-size:0.7rem;color:var(--muted)">${escHtml(m.run_id)}</div>` : ''}
          </div>`;
      }

      // Always-visible meta bar: memory + unique tools used
      const memHits = (m.pipe?.preamble?.memory_hits) || 0;
      const uniqueTools = [...new Set(traj.map(t => t.tool))];
      let metaBarHtml = '';
      if (memHits > 0 || uniqueTools.length > 0) {
        const memTag = memHits > 0 ? `<span class="meta-tag">메모리 ${memHits}건</span>` : '';
        const toolTags = uniqueTools.slice(0, 4).map(t =>
          `<span class="meta-tag tool">${escHtml(t.split('.')[1] || t)}</span>`).join('');
        metaBarHtml = `<div class="msg-meta-bar">${memTag}${toolTags}</div>`;
      }

      const div = document.createElement('div');
      div.className = 'msg aios';
      div.innerHTML = `
        <div class="msg-bubble">${renderMd(answer || '')}</div>
        ${metaBarHtml}
        ${traceHtml}
        <div class="msg-meta">${ts || ''}</div>`;
      return div;
    }

    function toggleTrace(id) {
      const el = document.getElementById(id);
      if (!el) return;
      el.classList.toggle('open');
      const btn = el.previousElementSibling;
      if (btn) btn.textContent = el.classList.contains('open') ? '▾ 실행 상세' : '▸ 실행 상세';
    }

    // ── Core: run goal via SSE ────────────────────────────────────────────────
    async function runGoal() {
      if (_running) return;
      const goalEl = document.getElementById('goalInput');
      const goal = goalEl.value.trim();
      if (!goal) { goalEl.focus(); return; }

      const provider = document.getElementById('providerSelect').value;
      const maxTurns = parseInt(document.getElementById('maxTurns').value);
      const ts = new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});

      goalEl.value = '';
      goalEl.style.height = 'auto';
      _running = true;
      document.getElementById('runBtn').disabled = true;
      document.getElementById('welcomeMsg').style.display = 'none';

      appendUserMsg(goal, ts);
      appendAiosThinking();
      scrollToBottom();

      try {
        await streamGoal(goal, provider, maxTurns, ts);
      } catch (err) {
        finishAiosMsg(`오류: ${err.message}`, {}, ts);
      } finally {
        _running = false;
        document.getElementById('runBtn').disabled = false;
        goalEl.focus();
      }
    }

    async function streamGoal(goal, provider, maxTurns, ts) {
      const resp = await fetch(`${API_BASE}/run/stream`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ goal, provider, max_turns: maxTurns, session_id: SESSION_ID }),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.error || `HTTP ${resp.status}`);
      }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });

        const blocks = buf.split('\n\n');
        buf = blocks.pop();

        for (const block of blocks) {
          const eventLine = block.split('\n').find(l => l.startsWith('event:'));
          const dataLine  = block.split('\n').find(l => l.startsWith('data:'));
          if (!eventLine || !dataLine) continue;
          const event = eventLine.slice(7).trim();
          let data;
          try { data = JSON.parse(dataLine.slice(6)); } catch { continue; }

          if (event === 'preamble') {
            const mem = data.memory_hits || 0;
            const sem = data.semantic_hits || 0;
            const cap = data.top_capability || null;
            const parts = _lang === 'ko'
              ? [`MemoryOS: ${mem}개`, sem ? `시맨틱 ${sem}개` : null, cap ? `라우트: ${cap}` : null]
              : [`MemoryOS: ${mem} hits`, sem ? `semantic: ${sem}` : null, cap ? `route: ${cap}` : null];
            updateThinkingLabel('⬡ ' + parts.filter(Boolean).join(' · ') + ' · 실행 중…');
          } else if (event === 'turn') {
            updateThinkingLabel(_lang === 'ko'
              ? `T${data.turn}: ${data.tool||'?'} 실행 중…`
              : `T${data.turn}: running ${data.tool||'?'}…`);
            scrollToBottom();
          } else if (event === 'done') {
            const meta = {
              exit: data.exit, turns: data.turns, trajectory: data.trajectory,
              run_id: data.run_id, pipe: data.organic_pipeline || {},
              memory_hits: (data.organic_pipeline?.preamble?.memory_hits) || 0,
            };
            finishAiosMsg(data.final_answer || '', meta, ts);
            saveHistory(goal, data.final_answer || '', meta);
            scrollToBottom();
          } else if (event === 'error') {
            finishAiosMsg(`오류: ${data.error || 'unknown'}`, {}, ts);
          }
        }
      }
    }

    function finishAiosMsg(answer, meta, ts) {
      const thread = document.getElementById('chatThread');
      if (_pendingAiosBubble) {
        thread.removeChild(_pendingAiosBubble);
        _pendingAiosBubble = null;
      }
      thread.appendChild(appendAiosMsg(answer, meta, ts, false));
      scrollToBottom();
    }

    // ── Utilities ─────────────────────────────────────────────────────────────
    function scrollToBottom() {
      const thread = document.getElementById('chatThread');
      thread.scrollTop = thread.scrollHeight;
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                      .replace(/"/g,'&quot;');
    }

    function fillGoal(text) {
      const el = document.getElementById('goalInput');
      el.value = text;
      el.focus();
      autoResize(el);
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    // ── Event wiring ──────────────────────────────────────────────────────────
    const goalInput = document.getElementById('goalInput');
    goalInput.addEventListener('input', () => autoResize(goalInput));
    goalInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); runGoal(); }
    });

    // Restore prior chat on page load
    restoreHistory();

    // ── Status badge: ping /health on load ───────────────────────────────────
    async function checkStatus() {
      const dot = document.getElementById('statusDot');
      const txt = document.getElementById('statusText');
      try {
        const r = await fetch(`${API_BASE}/health`, { signal: AbortSignal.timeout(3000) });
        if (r.ok) {
          dot.className = 'status-dot ok';
          txt.dataset.state = 'Ok';
          txt.textContent = I18N[_lang].statusOk;
        } else {
          throw new Error('not ok');
        }
      } catch {
        dot.className = 'status-dot err';
        txt.dataset.state = 'Err';
        txt.textContent = I18N[_lang].statusErr;
      }
    }
    checkStatus();

    // Apply stored language preference on load
    applyLang(_lang);
  </script>
</body>
</html>
