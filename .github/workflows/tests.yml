name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unittest:
    name: python unittest (myworld control plane)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # We need only the myworld control plane itself for these tests —
          # child OS repos (hivemind, memoryOS, CapabilityOS, GenesisOS,
          # GenesisOS) are git submodules and we leave them on their pinned
          # commits; CI doesn't recurse into them.
          submodules: false
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          # cache disabled: this repo has no requirements.txt / pyproject.toml
          # yet (myworld control plane uses stdlib only). When deps land, add
          # `cache: pip` back.

      - name: Show interpreter
        run: |
          python --version
          python -c "import sys, platform; print(platform.platform()); print(sys.executable)"

      - name: Compile-check Python files
        run: |
          python -m compileall -q scripts tests

      # The suite runs under pytest — the SAME command the docs give users
      # (`pytest tests/`; pyproject's addopts excludes research-probe fixtures).
      # `set -o pipefail` is load-bearing: a plain `cmd | tail` reports tail's
      # exit code, which once let 33 failures + 26 errors show a green badge.
      - name: Install pytest
        run: python -m pip install pytest

      - name: Run pytest
        run: |
          set -o pipefail
          python -m pytest tests/ -q 2>&1 | tail -80

      - name: Smoke-check CC4 organ CLI
        run: |
          python scripts/aios_external_knowledge_organ.py --help

      - name: Smoke-check CC2 sh installer
        run: |
          bash -n scripts/install.sh
          mkdir -p /tmp/aios_smoke_bin
          AIOS_PREFIX="$(pwd)" AIOS_BIN_DIR=/tmp/aios_smoke_bin AIOS_SKIP_FETCH=1 bash scripts/install.sh
          /tmp/aios_smoke_bin/aios --version
          /tmp/aios_smoke_bin/aios contract | wc -l
          /tmp/aios_smoke_bin/aios help
