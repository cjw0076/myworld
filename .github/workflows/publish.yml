name: publish

# Trigger: push a semver tag (e.g. v0.1.0)
#   git tag -a v0.1.0 -m "v0.1.0" && git push origin v0.1.0
#
# Requires: set PYPI_API_TOKEN as a GitHub repository secret
#   PyPI → Account settings → API tokens → Add API token (scope: aios-os project)
#   GitHub → repo Settings → Secrets → Actions → New secret: PYPI_API_TOKEN
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: pip install build && python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
